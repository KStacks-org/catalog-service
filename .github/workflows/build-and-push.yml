name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image name
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_NAME="ghcr.io/$OWNER/$REPO"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:master-${{ steps.meta.outputs.short_sha }}

  update-infra:
    name: Update image tag in infra repo
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: KStacks-org/infra
          token: ${{ secrets.INFRA_PAT }}
          path: infra

      - name: Update catalog image tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          NEW_IMAGE="ghcr.io/kstacks-org/catalog-service:master-${SHORT_SHA}"
          FILE="infra/catalog-service/deployment.yaml"

          yq -i ".spec.template.spec.containers[0].image = \"${NEW_IMAGE}\"" "$FILE"

          echo "Updated image to: ${NEW_IMAGE}"
          yq '.spec.template.spec.containers[0].image' "$FILE"

      - name: Commit and push changes
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          cd infra
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog-service/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(catalog): bump image to master-${SHORT_SHA}"
          git push
