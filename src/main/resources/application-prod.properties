spring.application.name=catalog-service

# Server Configuration
server.servlet.context-path=/catalog
server.forward-headers-strategy=framework
server.port=0

# Database Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catalog}
spring.datasource.username=${DB_USER:catalog_user}
spring.datasource.password=${DB_PASS:catalog_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:validate}

# SQL Logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Postgres Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Data Loader
app.data.load=${LOAD_DATA}
app.data.courses-url=${COURSES_URL}
app.data.instructors-url=${INSTRUCTORS_URL}

eureka.client.service-url.defaultZone=${EUREKA_DEFAULTZONE:http://localhost:8761/eureka}
