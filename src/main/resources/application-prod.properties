spring.application.name=catalog-service

# Server Configuration
server.servlet.context-path=/catalog
server.forward-headers-strategy=framework
server.port=41619

# Database Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catalog}
spring.datasource.username=${DB_USER:catalog_user}
spring.datasource.password=${DB_PASS:catalog_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:validate}

# SQL Logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Postgres Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Data Loader
app.data.load=${LOAD_DATA}
app.data.courses-url=${COURSES_URL}
app.data.instructors-url=${INSTRUCTORS_URL}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.roles=ACTUATOR
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.liveness.include=livenessState
