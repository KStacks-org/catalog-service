services:
  catalog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalog
    environment:
      SPRING_PROFILES_ACTIVE: prod

      # Database configuration
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-catalog}
      DB_USER: ${DB_USER:-catalog_user}
      DB_PASS: ${DB_PASS:-catalog_password}
      DB_DDL_AUTO: ${DB_DDL_AUTO:-validate}

      # Data loader
      LOAD_DATA: ${LOAD_DATA:-false}
      COURSES_URL: ${COURSES_URL:-http://localhost:80/courses}
      INSTRUCTORS_URL: ${INSTRUCTORS_URL:-http://localhost:80/instructors}
    ports:
      - "8080:8080"
    restart: unless-stopped
